<!doctype html>
<html lang="en">
<head>
  <meta name="robots" content="noindex,nofollow">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OneStop + Jarvis — Website Copy &amp; Wireframe (v2)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0E1518; --deepwater:#07384D; --tide:#006FA6;
    --cyan:#15A7DC; --cyan-lo:#4BD0F0; --cyan-hi:#1188C4;
    --foam:#F2FBFD; --cite:#5E6E74;
    --page:#E7EEF1; --card:#FFFFFF; --line:#D8E3E8;
    --tag:#8AA0AA;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    font-family:'Manrope',Inter,system-ui,sans-serif;
    background:var(--page); color:var(--ink);
    -webkit-font-smoothing:antialiased; line-height:1.5;
  }
  .wrap{max-width:1160px; margin:0 auto; padding:0 24px;}

  /* ---------- top bar ---------- */
  .topbar{position:sticky; top:0; z-index:50; background:var(--deepwater);
    border-bottom:1px solid rgba(255,255,255,.08);}
  .topbar .wrap{display:flex; align-items:center; gap:20px; height:60px;}
  .lockup{display:inline-flex; align-items:center; gap:10px;}
  .lockup .mark{height:24px; width:auto; display:block;}
  .lockup .wm{height:13px; width:auto; display:block;}
  .lockup.light .mark,.lockup.light .wm{filter:brightness(0) invert(1);}
  .lockup.ink .mark,.lockup.ink .wm{filter:brightness(0);}
  .topbar .doctitle{color:#cfe8f0; font-size:13px; font-weight:600; letter-spacing:.2px;}
  .topbar .doctitle b{color:#fff; font-weight:700;}
  .topbar .jump{margin-left:auto; display:flex; gap:6px;}
  .topbar .jump a{color:#bfe0ec; font-size:12.5px; font-weight:600; text-decoration:none;
    padding:7px 13px; border:1px solid rgba(255,255,255,.16); border-radius:2px;}
  .topbar .jump a:hover{background:rgba(255,255,255,.08); color:#fff;}
  .topbar .jump a.badge{border-color:var(--cyan); background:rgba(21,167,220,.16); color:#eafaff;}

  /* ---------- doc intro ---------- */
  .intro{padding:48px 0 8px;}
  .intro h1{font-size:34px; font-weight:800; letter-spacing:-.5px; line-height:1.12;}
  .intro .sub{color:var(--cite); font-size:15px; margin-top:12px; max-width:700px;}
  .legend{display:flex; flex-wrap:wrap; gap:14px; margin-top:26px;}
  .legend .lz{flex:1 1 300px; background:var(--card); border:1px solid var(--line);
    border-radius:4px; padding:16px 18px;}
  .legend .lz .k{font-size:11px; font-weight:700; letter-spacing:1.4px; color:var(--tide);
    text-transform:uppercase;}
  .legend .lz p{font-size:13.5px; color:#3c4a50; margin-top:7px;}
  .legend .lz .pill{display:inline-block; font-size:10.5px; font-weight:700; letter-spacing:1px;
    color:var(--tag); border:1px solid var(--line); border-radius:3px; padding:2px 7px; margin-top:9px;}

  /* ---------- page band ---------- */
  .pageband{margin-top:54px; padding:30px 0 18px; border-top:2px solid var(--deepwater);}
  .pageband .ey{font-size:12px; font-weight:800; letter-spacing:2px; color:var(--cyan-hi);
    text-transform:uppercase;}
  .pageband h2{font-size:27px; font-weight:800; letter-spacing:-.3px; margin-top:8px;}
  .pageband .url{display:inline-block; font-size:13px; font-weight:700; color:var(--tide);
    background:var(--foam); border:1px solid var(--line); border-radius:3px; padding:3px 10px; margin-top:12px;}
  .pageband .purpose{font-size:14.5px; color:#3c4a50; max-width:780px; margin-top:14px;}

  .guard{margin-top:18px; background:#0c2c3b; border-radius:6px; padding:18px 20px;}
  .guard .gh{display:flex; align-items:center; gap:9px; color:#bfe6f2; font-size:11.5px;
    font-weight:800; letter-spacing:1.4px; text-transform:uppercase;}
  .guard .gh svg{width:15px; height:15px; stroke:var(--cyan-lo);}
  .guard ul{list-style:none; margin-top:12px; display:grid; grid-template-columns:1fr 1fr; gap:7px 22px;}
  .guard li{color:#d4e9f1; font-size:12.8px; padding-left:18px; position:relative; line-height:1.45;}
  .guard li::before{content:""; position:absolute; left:0; top:7px; width:8px; height:8px;
    border:1.5px solid var(--cyan-lo); border-top:0; border-right:0; transform:rotate(-45deg);}

  /* ---------- section row ---------- */
  .sec{background:var(--card); border:1px solid var(--line); border-radius:6px;
    margin-top:18px; overflow:hidden;}
  .sec .sechead{display:flex; align-items:center; gap:12px; padding:13px 20px;
    border-bottom:1px solid var(--line); background:#fafdfe;}
  .sec .sn{font-size:12px; font-weight:800; color:#fff; background:var(--deepwater);
    border-radius:3px; padding:3px 8px; letter-spacing:.5px;}
  .sec .snm{font-size:13.5px; font-weight:700; letter-spacing:.2px;}
  .sec .slay{margin-left:auto; font-size:10.5px; font-weight:700; letter-spacing:.8px;
    color:var(--tag); text-transform:uppercase; border:1px solid var(--line); border-radius:20px; padding:3px 11px;}

  .grid{display:grid; grid-template-columns:0.92fr 1.08fr; gap:0;}
  .grid .col{padding:28px 26px;}
  .grid .col.copy{border-left:1px solid var(--line); background:#fff;}

  /* ---------- image placeholder ---------- */
  .ph{position:relative; height:100%; min-height:240px; border:1.5px dashed #B9CCD4;
    border-radius:5px; background:
      repeating-linear-gradient(135deg, rgba(21,167,220,.04) 0 11px, rgba(21,167,220,0) 11px 22px),
      var(--foam);
    padding:18px; display:flex; flex-direction:column;}
  .ph .ptype{display:inline-flex; align-items:center; gap:7px; align-self:flex-start;
    font-size:10.5px; font-weight:800; letter-spacing:1.2px; text-transform:uppercase;
    color:var(--tide); background:#fff; border:1px solid var(--line); border-radius:3px; padding:4px 9px;}
  .ph .ptype svg{width:14px; height:14px; stroke:var(--tide); fill:none; stroke-width:1.6;}
  .ph .pico{flex:0 0 auto; margin:14px 0 4px; opacity:.5;}
  .ph .pico svg{width:34px; height:34px; stroke:var(--tide); fill:none; stroke-width:1.4;}
  .ph .pdesc{font-size:13px; color:#33454d; line-height:1.5;}
  .ph .pnote{margin-top:auto; padding-top:14px; font-size:11.5px; color:var(--cite);
    border-top:1px dashed #cfdde3;}
  .ph .pnote b{color:var(--tide); font-weight:700; letter-spacing:.3px;}
  .ph .pratio{position:absolute; top:16px; right:16px; font-size:10.5px; font-weight:700;
    color:var(--tag);}

  /* ---------- copy blocks ---------- */
  .crow{display:grid; grid-template-columns:84px 1fr; gap:16px; padding:11px 0;}
  .crow + .crow{border-top:1px dotted #E2EBEF;}
  .crow .tag{font-size:10px; font-weight:800; letter-spacing:1px; color:var(--tag);
    text-transform:uppercase; padding-top:5px;}
  .crow .cval{min-width:0;}
  .eyebrow{font-size:12px; font-weight:800; letter-spacing:2px; color:var(--cyan-hi); text-transform:uppercase;}
  h3.h1{font-size:32px; font-weight:800; letter-spacing:-.6px; line-height:1.08;}
  h3.h2{font-size:25px; font-weight:800; letter-spacing:-.3px; line-height:1.14;}
  .subhead{font-size:16.5px; font-weight:600; color:#27343a; line-height:1.44;}
  .body{font-size:14.5px; color:#374249; line-height:1.62;}
  .callout{font-size:18px; font-weight:800; color:var(--tide); line-height:1.28;
    border-left:3px solid var(--cyan); padding-left:14px; letter-spacing:-.2px;}
  .lead{font-weight:800; color:var(--ink);}
  ul.clist{list-style:none; display:flex; flex-direction:column; gap:11px;}
  ul.clist li{font-size:14px; color:#374249; line-height:1.5; padding-left:24px; position:relative;}
  ul.clist li b{color:var(--ink); font-weight:700;}
  ul.clist li::before{content:""; position:absolute; left:2px; top:7px; width:9px; height:9px;
    border-radius:50%; border:2px solid var(--cyan); }
  ul.clist.num{counter-reset:c;}
  ul.clist.num li::before{content:counter(c); counter-increment:c; border:0; width:auto; height:auto;
    left:0; top:0; font-size:11px; font-weight:800; color:#fff; background:var(--tide);
    border-radius:50%; min-width:18px; height:18px; display:flex; align-items:center; justify-content:center; line-height:1;}
  ul.clist.num li{padding-left:28px;}
  ul.clist.never li::before{border:0; left:1px; top:3px; width:13px; height:13px; border-radius:50%;
    background:var(--cite);}
  ul.clist.never li{padding-left:24px; color:#374249;}
  .ctas{display:flex; flex-wrap:wrap; gap:10px; align-items:center;}
  .btn{display:inline-flex; align-items:center; font-size:13.5px; font-weight:700; border-radius:3px;
    padding:11px 20px; text-decoration:none; letter-spacing:.2px;}
  .btn.pri{background:var(--tide); color:#fff;}
  .btn.sec{background:transparent; color:var(--tide); border:1.5px solid var(--tide);}
  .micro{font-size:12.5px; color:var(--cite);}
  .form{display:flex; flex-wrap:wrap; gap:8px; align-items:center;}
  .field{font-size:12.5px; color:var(--cite); background:var(--foam); border:1px dashed #c4d4db;
    border-radius:3px; padding:9px 14px; font-weight:600;}
  .confirm{font-size:13px; color:#2b6b52; background:#eafaf2; border:1px solid #cdeadb;
    border-radius:4px; padding:11px 14px; line-height:1.5;}
  .disc{font-size:12px; color:var(--cite); background:var(--foam); border:1px solid var(--line);
    border-radius:4px; padding:11px 14px; line-height:1.5;}

  /* dark close sections render copy on tinted bg */
  .sec.closing .col.copy{background:#072634;}
  .sec.closing .col.copy .eyebrow{color:var(--cyan-lo);}
  .sec.closing .col.copy h3{color:#fff;}
  .sec.closing .col.copy .body,.sec.closing .col.copy .subhead{color:#bcd6e0;}
  .sec.closing .col.copy .body .lead{color:#fff;}
  .sec.closing .col.copy .crow + .crow{border-top-color:rgba(255,255,255,.10);}
  .sec.closing .col.copy .tag{color:#6f93a1;}
  .sec.closing .col.copy .btn.sec{color:#bfe6f2; border-color:#3d6a7b;}
  .sec.closing .col.copy .micro{color:#9fc0cd;}

  /* ---------- footers within pages ---------- */
  .pgfoot{background:#fff; border:1px solid var(--line); border-radius:6px; margin-top:18px;
    padding:22px 24px; display:flex; flex-wrap:wrap; gap:16px; align-items:center;}
  .pgfoot .nav{display:flex; gap:18px; flex-wrap:wrap; margin-left:auto;}
  .pgfoot .nav span{font-size:12.5px; font-weight:600; color:var(--cite);}
  .pgfoot .discline{flex:1 1 100%; font-size:11.5px; color:var(--cite); border-top:1px solid var(--line);
    padding-top:14px; line-height:1.5;}

  /* ---------- doc footer ---------- */
  .docfoot{margin:60px 0 40px; text-align:center; color:var(--cite); font-size:12.5px; line-height:1.7;}
  .docfoot b{color:var(--ink);}

  @media (max-width:820px){
    .grid{grid-template-columns:1fr;}
    .grid .col.copy{border-left:0; border-top:1px solid var(--line);}
    .guard ul{grid-template-columns:1fr;}
    .crow{grid-template-columns:1fr; gap:4px;}
    .crow .tag{padding-top:0;}
    .topbar .doctitle{display:none;}
    .intro h1{font-size:26px;}
  }
</style>
</head>

/* ===================== RENDER ===================== */
function copyBlock(c){
  let v='';
  if(c.eyebrow) v=`<div class="eyebrow">${c.eyebrow}</div>`;
  else if(c.h) v=`<h3 class="h${c.h}">${c.t}</h3>`;
  else if(c.sub) v=`<div class="subhead">${c.sub}</div>`;
  else if(c.body) v=`<div class="body">${c.body}</div>`;
  else if(c.callout) v=`<div class="callout">${c.callout}</div>`;
  else if(c.list){
    const cls = c.num?'clist num':(c.never?'clist never':'clist');
    v=`<ul class="${cls}">${c.list.map(i=>`<li>${i}</li>`).join('')}</ul>`;
  }
  else if(c.pri){
    v=`<div class="ctas"><a class="btn pri">${c.pri}</a>${c.sec?`<a class="btn sec">${c.sec}</a>`:''}</div>`;
  }
  else if(c.form){
    v=`<div class="form">${c.form.slice(0,-1).map(f=>`<span class="field">${f}</span>`).join('')}<a class="btn pri">${c.form[c.form.length-1]}</a></div>`;
  }
  else if(c.confirm) v=`<div class="confirm">${c.confirm}</div>`;
  else if(c.micro) v=`<div class="micro">${c.micro}</div>`;
  return `<div class="crow"><div class="tag">${c.r}</div><div class="cval">${v}</div></div>`;
}

function section(s){
  const t = s.img.type;
  return `
  <section class="sec ${s.closing?'closing':''}">
    <div class="sechead">
      <span class="sn">${s.n}</span>
      <span class="snm">${s.name}</span>
      <span class="slay">${s.lay}</span>
    </div>
    <div class="grid">
      <div class="col">
        <div class="ph">
          <span class="ptype">${ICON[t]||''}${t}</span>
          <span class="pratio">${s.img.ratio}</span>
          <span class="pico">${ICON[t]||''}</span>
          <div class="pdesc">${s.img.desc}</div>
          <div class="pnote"><b>Layout</b> · ${s.img.note}</div>
        </div>
      </div>
      <div class="col copy">
        ${s.copy.map(copyBlock).join('')}
      </div>
    </div>
  </section>`;
}
